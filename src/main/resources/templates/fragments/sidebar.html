<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- ══════════ SIDEBAR ══════════ -->
<aside class="sidebar" id="sidebar" th:fragment="sidebar(activePage)">

    <div class="sidebar-logo">
        <div class="logo-mark">₴</div>
        <div class="logo-label">UA<span>Tax</span> Calc</div>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
    </button>

    <nav class="nav-section">
        <div class="nav-label">Reports</div>

        <a href="/" class="nav-item active" th:classappend="${activePage == 'stock'} ? 'active'"
           data-tip="Stock &amp; Dividend">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
            </div>
            <span class="nav-text">Stock / Dividend</span>
            <span class="nav-badge">CSV · XML</span>
        </a>

        <a href="/solar" class="nav-item" th:classappend="${activePage == 'solar'} ? 'active'"
           data-tip="Solar Income">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </div>
            <span class="nav-text">Solar Income</span>
            <span class="nav-badge">XLSX</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-footer-inner">
            <div class="avatar">U</div>
            <div class="avatar-info">
                <div class="avatar-name">User</div>
                <div class="avatar-role">Tax Reporter</div>
            </div>
        </div>
    </div>

</aside>
</body>
</html>
