<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Solar Income Reports')}"></head>

<body>
<link rel="stylesheet" th:href="@{/css/solar.css}"/>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar('solar')}"></div>

<!-- Main -->
<div class="main-wrap">

  <div th:replace="~{fragments/layout :: topbar('Reports', 'Solar Income')}"></div>

  <main class="page">

    <!-- Totals banner (statistics flavour) -->
    <div class="solar-banner" th:if="${total}">
      <div>
        <p class="solar-banner-label" th:text="#{solar.banner_label}">Total Earnings</p>
        <div class="solar-banner-values">
          <span class="solar-banner-value" th:text="${total}">0.00₴</span>
          <span class="solar-banner-value" th:text="${usTotal}">0.00$</span>
        </div>
      </div>
      <div class="solar-banner-meta">
        <strong th:text="#{solar.records(${#lists.size(reports)})}">0 records</strong>
      </div>
    </div>

    <!-- Status message -->
    <div class="message" th:if="${message}">
      <span th:text="${message}"></span>
    </div>

    <div class="divider">transactions</div>

    <!-- Results -->
    <div class="results">
      <div class="results-header">
        <h2 th:text="#{solar.title}">Transaction Records</h2>
        <form th:if="${not #lists.isEmpty(reports)}" method="POST" th:action="@{/solar/delete}" class="delete-form"
              onsubmit="return confirm('Delete all solar records? This cannot be undone.')">
          <button type="submit" class="btn-delete">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            <span th:text="#{common.delete_records}">Delete Records</span>
          </button>
        </form>
      </div>

      <div class="table-wrap" th:if="${not #lists.isEmpty(reports)}">
        <table>
          <thead>
          <tr>
            <th th:text="#{solar.col_date}">Date</th>
            <th style="text-align:center" th:text="#{solar.col_amount}">Amount</th>
            <th style="text-align:center" th:text="#{solar.col_rate}">Exchange Rate</th>
            <th style="text-align:center" th:text="#{solar.col_usd}">USD Value</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="report : ${reports}">
            <td th:text="${report.date}">—</td>
            <td th:text="${report.amount} + '₴'" style="text-align:center">—</td>
            <td th:text="${report.exchangeRate}" style="text-align:center">—</td>
            <td th:text="${report.usdValue} + '$'" style="text-align:center">—</td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="empty-state" th:if="${#lists.isEmpty(reports)}">
        <span class="empty-icon">🌱</span>
        <p th:utext="#{solar.empty}">No records yet.<br>Upload a statement above to see your solar savings.</p>
      </div>
    </div>

    <!-- Upload card -->
    <div class="upload-card">
      <p class="section-label" th:text="#{solar.import}">Import Statement</p>
      <form method="POST" th:action="@{/green}" enctype="multipart/form-data" id="upload-form">
        <div class="drop-zone" id="drop-zone">
          <input type="file" name="file" required id="file-input" accept=".xlsx,.xls,.csv"/>
          <span class="drop-icon">🌤️</span>
          <p class="drop-label">
            <span th:utext="#{solar.drop_label}">Drop your bank export here or <strong>browse files</strong></span><br>
            <span style="font-size:12px; opacity:0.7;">.xlsx · .xls · .csv</span>
          </p>
        </div>
        <p id="file-name"></p>
        <button type="submit" class="submit-btn" th:text="#{solar.analyse}">⚡ Analyse Savings</button>
      </form>
    </div>
  </main>

  <div th:replace="~{fragments/layout :: footer}"></div>

</div><!-- /.main-wrap -->

<th:block th:replace="~{fragments/layout :: sidebarScript}"/>

<script>
  const input = document.getElementById('file-input');
  const label = document.getElementById('file-name');
  const zone  = document.getElementById('drop-zone');

  input.addEventListener('change', () => {
      label.textContent = input.files[0]?.name ?? '';
  });

  ['dragover','dragenter'].forEach(evt => zone.addEventListener(evt, e => {
      e.preventDefault(); zone.classList.add('drag-over');
  }));

  ['dragleave','dragend'].forEach(evt => zone.addEventListener(evt, () => {
      zone.classList.remove('drag-over');
  }));

  zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) {
          input.files = e.dataTransfer.files;
          label.textContent = e.dataTransfer.files[0].name;
      }
  });
</script>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
